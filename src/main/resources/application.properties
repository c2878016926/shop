spring.application.name=shop
server.port=8081

# 脙楼脗录脗潞脙楼脗聢脗露 UTF-8 脙搂脗录脗聳脙搂脗聽脗聛脙炉脗录脗聦脙搂脗隆脗庐脙陇脗驴脗聺脙陇脗赂脗颅脙娄脗聳脗聡脙陇脗赂脗聧脙陇脗鹿脗卤脙搂脗聽脗聛
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

spring.datasource.url=jdbc:mysql://localhost:3306/shop_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=123456

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.thymeleaf.cache=false

