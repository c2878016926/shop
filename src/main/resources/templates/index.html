<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif;
            background: #f0f2f5; min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 24px 0; box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }
        .header-inner {
            max-width: 1060px; margin: 0 auto; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { color: #fff; font-size: 22px; font-weight: 700; }
        .header-badge {
            background: rgba(255,255,255,0.2); color: #fff; padding: 4px 12px;
            border-radius: 20px; font-size: 12px; font-weight: 500;
        }
        .container { max-width: 1060px; margin: 0 auto; padding: 24px 20px 40px; }
        .msg {
            padding: 12px 18px; background: #f6ffed; border: 1px solid #b7eb8f;
            color: #389e0d; border-radius: 8px; margin-bottom: 16px; font-size: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .msg::before { content: '✓'; font-weight: 700; font-size: 16px; }
        .toolbar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 18px; flex-wrap: wrap; gap: 12px;
        }
        .feature-btns { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn {
            padding: 9px 18px; border: none; border-radius: 8px; cursor: pointer;
            font-size: 13px; font-weight: 600; text-decoration: none; display: inline-flex;
            align-items: center; gap: 6px; transition: all 0.25s; white-space: nowrap;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.25);
        }
        .btn-primary:hover { box-shadow: 0 5px 15px rgba(102, 126, 234, 0.35); }
        .btn-danger { background: #ff4d4f; color: #fff; box-shadow: 0 3px 10px rgba(255,77,79,0.2); }
        .btn-danger:hover { background: #ff7875; }
        .btn-warning { background: #faad14; color: #fff; }
        .btn-warning:hover { background: #ffc53d; }
        .btn-success { background: #52c41a; color: #fff; }
        .btn-success:hover { background: #73d13d; }
        .btn-purple { background: #722ed1; color: #fff; }
        .btn-purple:hover { background: #9254de; }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 6px; }
        .btn-disabled { background: #e8e8e8; color: #bbb; cursor: not-allowed; }
        .btn-disabled:hover { transform: none; }
        .search-box { display: flex; gap: 8px; align-items: center; }
        .search-box input {
            padding: 9px 14px; border: 2px solid #e8e8e8; border-radius: 8px;
            width: 220px; font-size: 13px; transition: all 0.3s;
        }
        .search-box input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .table-card {
            background: #fff; border-radius: 12px; overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            padding: 14px 16px; text-align: left; font-size: 12px; font-weight: 700;
            color: #8c8c8c; text-transform: uppercase; letter-spacing: 0.5px;
            background: #fafafa; border-bottom: 2px solid #f0f0f0;
        }
        td {
            padding: 14px 16px; font-size: 14px; color: #333; border-bottom: 1px solid #f5f5f5;
        }
        tr:hover td { background: #fafbff; }
        .id-cell { font-weight: 700; color: #667eea; }
        .price-cell { font-weight: 600; color: #52c41a; }
        .stock-cell {
            display: inline-block; padding: 2px 10px; border-radius: 12px;
            font-size: 12px; font-weight: 600;
        }
        .stock-ok { background: #f6ffed; color: #389e0d; }
        .stock-low { background: #fff7e6; color: #d46b08; }
        .stock-out { background: #fff1f0; color: #cf1322; }
        .desc-cell {
            max-width: 200px; overflow: hidden; text-overflow: ellipsis;
            white-space: nowrap; color: #888; font-size: 13px;
        }
        .actions { display: flex; gap: 6px; align-items: center; }
        .delete-form { display: inline; }
        .empty {
            text-align: center; padding: 60px 20px; color: #bbb;
        }
        .empty-icon { font-size: 48px; margin-bottom: 12px; }
        .empty-text { font-size: 15px; }
        .pagination {
            display: flex; justify-content: center; align-items: center;
            gap: 8px; margin-top: 20px; padding: 0 20px;
        }
        .page-info { color: #888; font-size: 13px; padding: 0 12px; }
        .footer {
            text-align: center; color: #bbb; font-size: 12px; margin-top: 40px; padding-bottom: 20px;
        }
        .delete-all-form { display: inline; }
        /* 响应式布局适配 */
        @media (max-width: 768px) {
            .header-inner { flex-direction: column; gap: 12px; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .search-box { width: 100%; }
            .search-box input { flex: 1; }
            table { font-size: 12px; }
            th, td { padding: 8px 6px; }
            .actions { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
<div class="header">
    <div class="header-inner">
        <h1>📦 商品管理系统</h1>
        <span class="header-badge" th:if="${productPage != null}"
              th:text="'共 ' + ${productPage.totalElements} + ' 件商品'">共 0 件商品</span>
    </div>
</div>
<div class="container">
    <div th:if="${msg}" class="msg" th:text="${msg}"></div>
    <div class="toolbar">
        <div class="feature-btns">
            <a href="/add" class="btn btn-primary">+ 添加商品</a>
            <a href="/orders" class="btn btn-info" style="background:#1890ff;color:#fff;">📦 订单管理</a>
            <a href="/categories" class="btn btn-success">📂 分类管理</a>
            <a href="/concurrent" class="btn btn-success">并发测试</a>
            <a href="/stats" class="btn btn-purple">数据统计</a>
            <form class="delete-all-form" action="/delete-all" method="post"
                  onsubmit="return confirm('确定要清空所有商品吗？清空后ID将重置！')">
                <button type="submit" class="btn btn-danger">清空所有</button>
            </form>
        </div>
        <form class="search-box" action="/search" method="get">
            <input type="text" name="name" placeholder="搜索商品名称..." th:value="${keyword}"/>
            <button type="submit" class="btn btn-primary btn-sm">搜索</button>
            <a href="/" class="btn btn-warning btn-sm">重置</a>
        </form>
    </div>

    <div class="table-card">
        <table>
            <thead>
            <tr>
                <th style="width:60px">ID</th>
                <th>商品名称</th>
                <th>描述</th>
                <th style="width:100px">价格</th>
                <th style="width:80px">库存</th>
                <th style="width:130px">操作</th>
            </tr>
            </thead>
            <tbody>
            <th:block th:if="${productPage != null and !productPage.content.isEmpty()}">
                <tr th:each="p : ${productPage.content}">
                    <td class="id-cell" th:text="${p.id}"></td>
                    <td style="font-weight:600" th:text="${p.name}"></td>
                    <td class="desc-cell" th:text="${p.description}" th:title="${p.description}"></td>
                    <td class="price-cell" th:text="${p.price} != null ? '¥' + ${#numbers.formatDecimal(p.price, 1, 2)} : '-'"></td>
                    <td>
                        <span class="stock-cell"
                              th:classappend="${p.stock > 10} ? 'stock-ok' : (${p.stock > 0} ? 'stock-low' : 'stock-out')"
                              th:text="${p.stock}"></span>
                    </td>
                    <td class="actions">
                        <a th:href="@{/edit/{id}(id=${p.id})}" class="btn btn-warning btn-sm">编辑</a>
                        <form class="delete-form" th:action="@{/delete/{id}(id=${p.id})}" method="post"
                              onsubmit="return confirm('确定删除【' + this.closest('tr').querySelector('.id-cell').textContent + '】吗？')">
                            <button type="submit" class="btn btn-danger btn-sm">删除</button>
                        </form>
                    </td>
                </tr>
            </th:block>
            <tr th:unless="${productPage != null and !productPage.content.isEmpty()}">
                <td colspan="6" class="empty">
                    <div class="empty-icon">📭</div>
                    <div class="empty-text">暂无商品数据，点击上方按钮添加</div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="pagination" th:if="${productPage != null && productPage.totalPages > 1}">
        <a th:if="${productPage.hasPrevious()}"
           th:href="${keyword != null} ? @{/search(name=${keyword}, page=${productPage.number - 1})} : @{/(page=${productPage.number - 1})}"
           class="btn btn-primary btn-sm">上一页</a>
        <span th:if="${!productPage.hasPrevious()}" class="btn btn-disabled btn-sm">上一页</span>
        <span class="page-info">第 <span th:text="${productPage.number + 1}"></span> / <span th:text="${productPage.totalPages}"></span> 页，共 <span th:text="${productPage.totalElements}"></span> 条</span>
        <a th:if="${productPage.hasNext()}"
           th:href="${keyword != null} ? @{/search(name=${keyword}, page=${productPage.number + 1})} : @{/(page=${productPage.number + 1})}"
           class="btn btn-primary btn-sm">下一页</a>
        <span th:if="${!productPage.hasNext()}" class="btn btn-disabled btn-sm">下一页</span>
    </div>

    <div class="footer">简易商品管理系统 · Spring Boot + Thymeleaf</div>
</div>
</body>
</html>
