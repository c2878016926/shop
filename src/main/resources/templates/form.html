<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.id} ? '编辑商品' : '添加商品'">商品表单</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .card {
            width: 100%; max-width: 520px; background: #fff; border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15); padding: 40px 36px 30px; position: relative;
        }
        .card-header { text-align: center; margin-bottom: 28px; }
        .card-header h1 { font-size: 22px; color: #1a1a2e; font-weight: 700; }
        .card-header p { font-size: 13px; color: #999; margin-top: 6px; }
        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px;
            font-weight: 600; margin-bottom: 10px;
        }
        .badge-add { background: #e8f5e9; color: #2e7d32; }
        .badge-edit { background: #fff3e0; color: #e65100; }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block; margin-bottom: 6px; color: #555; font-weight: 600; font-size: 13px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .form-group label .required { color: #ff4d4f; margin-left: 2px; }
        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group textarea {
            width: 100%; padding: 11px 14px; border: 2px solid #e8e8e8; border-radius: 8px;
            font-size: 14px; transition: all 0.3s; background: #fafafa;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none; border-color: #667eea; background: #fff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .form-group input:read-only {
            background: #f0f0f0; color: #999; cursor: not-allowed;
        }
        .form-group .hint { font-size: 11px; color: #bbb; margin-top: 4px; }
        .form-group textarea { resize: vertical; min-height: 70px; }
        .id-section {
            background: #f8f9ff; border: 2px dashed #c5cae9; border-radius: 10px;
            padding: 14px 16px; margin-bottom: 20px; transition: all 0.3s;
        }
        .id-section.active { border-color: #667eea; background: #f0f2ff; }
        .id-toggle {
            display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none;
        }
        .id-toggle input[type="checkbox"] { width: 16px; height: 16px; accent-color: #667eea; }
        .id-toggle span { font-size: 13px; color: #667eea; font-weight: 600; }
        .id-input-wrap { margin-top: 12px; display: none; }
        .id-input-wrap.show { display: block; }
        .id-input-wrap input {
            width: 100%; padding: 11px 14px; border: 2px solid #c5cae9; border-radius: 8px;
            font-size: 14px; transition: all 0.3s; background: #fff;
        }
        .id-input-wrap input:focus {
            outline: none; border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .error { color: #ff4d4f; font-size: 12px; margin-top: 4px; }
        .error-box {
            background: #fff2f0; border: 1px solid #ffccc7; color: #ff4d4f;
            padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 13px;
        }
        .btn-row { display: flex; gap: 10px; margin-top: 28px; }
        .btn {
            flex: 1; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer;
            font-size: 15px; font-weight: 600; text-decoration: none; text-align: center;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4); }
        .btn-default { background: #f0f0f0; color: #666; }
        .btn-default:hover { background: #e8e8e8; }
        .readonly-info {
            background: #f0f5ff; border: 1px solid #adc6ff; border-radius: 8px;
            padding: 10px 14px; margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
        }
        .readonly-info .id-label { font-size: 13px; color: #1d39c4; font-weight: 600; }
        .readonly-info .id-value { font-size: 18px; color: #1d39c4; font-weight: 700; }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <th:block th:if="${product.id}">
            <span class="badge badge-edit">编辑模式</span>
            <h1>编辑商品</h1>
        </th:block>
        <th:block th:unless="${product.id}">
            <span class="badge badge-add">新增模式</span>
            <h1>添加商品</h1>
            <p>填写商品信息，可选自定义ID</p>
        </th:block>
    </div>

    <div th:if="${errorMsg}" class="error-box" th:text="${errorMsg}"></div>

    <!-- 编辑模式：显示只读ID -->
    <div th:if="${product.id}" class="readonly-info">
        <span class="id-label">商品ID：</span>
        <span class="id-value" th:text="${product.id}"></span>
    </div>

    <!-- 编辑模式表单 -->
    <form th:if="${product.id}" id="editForm" th:action="@{/save-edit}" method="post" th:object="${product}" accept-charset="UTF-8">
        <input type="hidden" name="originalId" th:value="${product.id}"/>
        <!-- 修改ID区域 -->
        <div class="id-section" id="idSection">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
                <span class="id-label" style="font-size:13px;color:#555;font-weight:600">当前ID：</span>
                <span class="id-value" style="font-size:18px;color:#667eea;font-weight:700" th:text="${product.id}"></span>
            </div>
            <label class="id-toggle">
                <input type="checkbox" id="changeId" onchange="toggleChangeId()"/>
                <span>修改商品ID</span>
            </label>
            <div class="id-input-wrap" id="idInputWrap">
                <input type="number" name="newId" id="newIdInput" min="1" placeholder="输入新的ID"
                       th:value="${newId}"/>
                <div class="hint">输入新的ID号。如果该ID已被占用会提示错误。</div>
            </div>
        </div>
        <div class="form-group">
            <label>商品名称 <span class="required">*</span></label>
            <input type="text" th:field="*{name}" placeholder="请输入商品名称"/>
            <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>
        <div class="form-group">
            <label>描述</label>
            <textarea th:field="*{description}" placeholder="请输入商品描述"></textarea>
        </div>
        <div class="form-group">
            <label>价格 <span class="required">*</span></label>
            <input type="number" step="0.01" min="0.01" th:field="*{price}" placeholder="0.00"/>
            <div class="error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>
        <div class="form-group">
            <label>库存 <span class="required">*</span></label>
            <input type="number" min="0" th:field="*{stock}" placeholder="0"/>
            <div class="error" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></div>
        </div>
        <div class="btn-row">
            <button type="submit" class="btn btn-primary">保存修改</button>
            <a href="/" class="btn btn-default">取消</a>
        </div>
    </form>

    <!-- 新增模式表单 -->
    <form th:unless="${product.id}" id="addForm" th:action="@{/save}" method="post" th:object="${product}" accept-charset="UTF-8">
        <!-- 自定义ID区域 -->
        <div class="id-section" id="idSection">
            <label class="id-toggle">
                <input type="checkbox" id="useCustomId" onchange="toggleCustomId()"/>
                <span>自定义商品ID</span>
            </label>
            <div class="id-input-wrap" id="idInputWrap">
                <input type="number" name="customId" id="customIdInput" min="1" placeholder="输入你想要的ID，例如：1"
                       th:value="${customId}"/>
                <div class="hint">留空则自动生成ID。指定ID若已被占用会提示错误。</div>
            </div>
        </div>

        <div class="form-group">
            <label>商品名称 <span class="required">*</span></label>
            <input type="text" th:field="*{name}" placeholder="请输入商品名称"/>
            <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>
        <div class="form-group">
            <label>描述</label>
            <textarea th:field="*{description}" placeholder="请输入商品描述"></textarea>
        </div>
        <div class="form-group">
            <label>价格 <span class="required">*</span></label>
            <input type="number" step="0.01" min="0.01" th:field="*{price}" placeholder="0.00"/>
            <div class="error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>
        <div class="form-group">
            <label>库存 <span class="required">*</span></label>
            <input type="number" min="0" th:field="*{stock}" placeholder="0"/>
            <div class="error" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></div>
        </div>
        <div class="btn-row">
            <button type="submit" class="btn btn-primary">添加商品</button>
            <a href="/" class="btn btn-default">取消</a>
        </div>
    </form>
</div>

<script>
    function toggleCustomId() {
        var cb = document.getElementById('useCustomId');
        var wrap = document.getElementById('idInputWrap');
        var section = document.getElementById('idSection');
        var form = document.getElementById('addForm');
        if (cb.checked) {
            wrap.classList.add('show');
            section.classList.add('active');
            form.action = '/save-with-id';
            document.getElementById('customIdInput').focus();
        } else {
            wrap.classList.remove('show');
            section.classList.remove('active');
            form.action = '/save';
            document.getElementById('customIdInput').value = '';
        }
    }
    function toggleChangeId() {
        var cb = document.getElementById('changeId');
        var wrap = document.getElementById('idInputWrap');
        var section = document.getElementById('idSection');
        if (cb.checked) {
            wrap.classList.add('show');
            section.classList.add('active');
            document.getElementById('newIdInput').focus();
        } else {
            wrap.classList.remove('show');
            section.classList.remove('active');
            document.getElementById('newIdInput').value = '';
        }
    }
    // 页面加载时如果有值则自动展开
    (function() {
        var v = document.getElementById('customIdInput');
        if (v && v.value) {
            document.getElementById('useCustomId').checked = true;
            toggleCustomId();
        }
        var n = document.getElementById('newIdInput');
        if (n && n.value) {
            document.getElementById('changeId').checked = true;
            toggleChangeId();
        }
    })();
</script>
</body>
</html>
